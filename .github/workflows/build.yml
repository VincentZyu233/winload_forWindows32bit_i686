name: Build Windows 7 Legacy Artifact

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      mode:
        description: Build mode
        required: false
        default: action
        type: choice
        options:
          - action
          - release

permissions:
  contents: write

jobs:
  check:
    name: Check commit message
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.flags.outputs.should_build }}
      should_release: ${{ steps.flags.outputs.should_release }}
      version: ${{ steps.flags.outputs.version }}
      mode: ${{ steps.flags.outputs.mode }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug directory structure
        run: |
          apt-get update -qq && apt-get install -y tree > /dev/null 2>&1
          echo "📁 Repository structure:"
          tree -L 2 -I '.git' || find . -maxdepth 2 -type f -name "*.toml" -o -type d | head -20

      - name: Parse trigger
        id: flags
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          DISPATCH_MODE: ${{ github.event.inputs.mode }}
        run: |
          if [ -f "rust/Cargo.toml" ]; then
            VERSION="v$(grep '^version' rust/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')"
          else
            VERSION="v0.1.9-beta.2"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "📦 Version: $VERSION"

          MODE="legacy"
          SHOULD_BUILD=false
          SHOULD_RELEASE=false

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ -n "$DISPATCH_MODE" ]; then
              MODE="$DISPATCH_MODE"
            fi
            SHOULD_BUILD=true
            if [ "$MODE" = "release" ]; then
              SHOULD_RELEASE=true
            fi
          else
            MSG="$COMMIT_MSG"
            if echo "$MSG" | grep -qiE 'build action|build release'; then
              SHOULD_BUILD=true
              if echo "$MSG" | grep -qi 'build release'; then
                MODE="release"
                SHOULD_RELEASE=true
              else
                MODE="action"
              fi
            fi
          fi

          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "should_build=$SHOULD_BUILD" >> "$GITHUB_OUTPUT"
          echo "should_release=$SHOULD_RELEASE" >> "$GITHUB_OUTPUT"
          echo "📋 Flags: build=$SHOULD_BUILD mode=$MODE"

  build:
    name: Build Windows i686 MinGW
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: i686-pc-windows-gnu

      - name: Setup MSYS2 for MinGW32
        id: msys2
        uses: msys2/setup-msys2@v2
        with:
          update: true
          msystem: MINGW32
          install: >-
            mingw-w64-i686-toolchain

      - name: Add MinGW32 to PATH
        shell: pwsh
        run: |
          $msys2 = "${{ steps.msys2.outputs.msys2-location }}"
          "$msys2\mingw32\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "$msys2\usr\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "CARGO_TARGET_I686_PC_WINDOWS_GNU_LINKER=$msys2\mingw32\bin\gcc.exe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CC_i686_pc_windows_gnu=$msys2\mingw32\bin\gcc.exe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "AR_i686_pc_windows_gnu=$msys2\mingw32\bin\ar.exe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Print tool versions
        shell: pwsh
        run: |
          rustc -Vv
          cargo -V
          where.exe gcc
          gcc --version

      - name: Build legacy binary
        shell: pwsh
        working-directory: rust
        run: |
          cargo build --release --locked --no-default-features --target i686-pc-windows-gnu

      - name: Package artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item "rust/target/i686-pc-windows-gnu/release/winload.exe" "dist/winload-windows-i686-mingw-no-npcap.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: winload-windows-i686-mingw-no-npcap
          path: dist/winload-windows-i686-mingw-no-npcap.exe
          if-no-files-found: error

      - name: Delete existing GitHub release
        if: needs.check.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $version = "${{ needs.check.outputs.version }}"
          gh release view $version 2>$null
          if ($LASTEXITCODE -eq 0) {
            gh release delete $version --yes --cleanup-tag | Out-Null
          }

      - name: Create GitHub release
        if: needs.check.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $version = "${{ needs.check.outputs.version }}"
          $asset = "dist/winload-windows-i686-mingw-no-npcap.exe"
          $notes = "Legacy Windows 7 build for 32-bit VMware testing. Commit: ${{ github.sha }}"
          gh release create $version $asset --title $version --notes $notes
